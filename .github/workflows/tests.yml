name: Run all the unit tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        directory:
          - openai-agents-sdk
          - pydantic-ai
          - claude-agent-sdk
    defaults:
      run:
        working-directory: ${{ matrix.directory }}

    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install -U pip
          pip install -r requirements.txt
          pip install ".[test]"
      - name: Run all tests
        run: |
          pytest
